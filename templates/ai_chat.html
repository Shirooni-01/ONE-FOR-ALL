<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Chat | One For All</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/ai_chat.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="container">

    <!-- =========================
            SIDEBAR
    ========================== -->

    <aside class="sidebar">

        <div class="logo">

            <i class="fa-solid fa-robot"></i>

            <h2>

                One AI

            </h2>

        </div>

        <button
            id="newChatBtn"
            class="new-chat">

            <i class="fa-solid fa-plus"></i>

            New Chat

        </button>

        <div class="history">

            <h3>

                Recent Chats

            </h3>

            <ul>

                <li>

                    Welcome Conversation

                </li>

                <li>

                    Programming Help

                </li>

                <li>

                    Study Notes

                </li>

            </ul>

        </div>

    </aside>



    <!-- =========================
            CHAT AREA
    ========================== -->

    <main class="chat-container">

        <header class="chat-header">

            <div>

                <h1>

                    AI Assistant

                </h1>

                <p>

                    Powered by Gemini 2.5 Flash

                </p>

            </div>

            <button
                id="clearChatBtn"
                class="clear-btn">

                <i class="fa-solid fa-trash"></i>

                Clear

            </button>

        </header>



        <!-- =========================
                CHAT BOX
        ========================== -->

        <div
            id="chatBox"
            class="chat-box">

            <div class="message ai">

                <div class="avatar">

                    <i class="fa-solid fa-robot"></i>

                </div>

                <div class="bubble">

                    👋 Hello!

                    <br><br>

                    I am your AI assistant.

                    Ask me anything.

                </div>

            </div>

                        <!-- =========================
                    TYPING INDICATOR
            ========================== -->

            <div
                id="typingIndicator"
                class="message ai typing"
                style="display:none;">

                <div class="avatar">

                    <i class="fa-solid fa-robot"></i>

                </div>

                <div class="bubble">

                    <span></span>
                    <span></span>
                    <span></span>

                </div>

            </div>

        </div>



        <!-- =========================
                INPUT AREA
        ========================== -->

        <div class="input-area">

            <textarea

                id="userInput"

                rows="1"

                placeholder="Message One AI..."></textarea>

            <button
                id="sendBtn">

                <i class="fa-solid fa-paper-plane"></i>

            </button>

        </div>

    </main>

</div>



<!-- =========================
        TOAST
========================== -->

<div
    id="toast"
    class="toast">

    Message Sent

</div>



<script src="{{ url_for('static', filename='js/ai_chat.js') }}"></script>

</body>

</html>
