<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Password Generator | One For All</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/password.css') }}">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="container">

    <!-- ================= HEADER ================= -->

    <header>

        <a href="/" class="back-btn">

            <i class="fa-solid fa-arrow-left"></i>

        </a>

        <h1>

            Password Generator

        </h1>

        <p>

            Generate secure passwords instantly.

        </p>

    </header>


    <!-- ================= GENERATOR ================= -->

    <div class="generator-card">

        <form method="POST">

            <div class="password-box">

                <input

                    type="text"

                    id="password"

                    readonly

                    value="{{ generated_password if generated_password else '' }}"

                    placeholder="Click Generate Password">

                <button

                    type="button"

                    id="copyBtn"

                    class="copy-btn">

                    <i class="fa-regular fa-copy"></i>

                </button>

            </div>



            <label class="checkbox">

                <input

                    type="checkbox"

                    name="pronounceable"

                    value="1">

                Generate Pronounceable Password

            </label>



            <button

                type="submit"

                class="generate-btn">

                <i class="fa-solid fa-key"></i>

                Generate Password

            </button>

        </form>

    </div>


    <!-- ================= STRENGTH ================= -->

    {% if generated_password %}

    <div class="strength-card">

        <div class="strength-header">

            <h2>

                Password Strength

            </h2>

            <span>

                {{ rating }}

            </span>

        </div>

        <div class="strength-bar">

            <div

                class="strength-fill"

                style="width: {{ (score/6)*100 }}%;">

            </div>

        </div>

    </div>

    {% endif %}


    <!-- ================= HISTORY ================= -->

    <section class="history">

        <h2>

            Recent Passwords

        </h2>

        {% if password_history %}

            {% for password in password_history %}

            <div class="history-card">

                <input

                    type="password"

                    value="{{ password }}"

                    readonly

                    class="history-password">

                <div class="history-actions">

                    <button

                        type="button"

                        class="show-btn">

                        <i class="fa-regular fa-eye"></i>

                    </button>

                    <button

                        type="button"

                        class="copy-history">

                        <i class="fa-regular fa-copy"></i>

                    </button>

                </div>

            </div>

            {% endfor %}

        {% else %}

        <div class="empty">

            <i class="fa-solid fa-lock"></i>

            <p>

                No passwords generated yet.

            </p>

        </div>

        {% endif %}

    </section>

</div>

<script src="{{ url_for('static', filename='js/password.js') }}"></script>

</body>

</html>
